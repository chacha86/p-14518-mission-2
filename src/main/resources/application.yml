server:
  port: 8070

spring:
  application:
    name: demo

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:./db_dev;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    dirver-class-name: org.h2.Driver #

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
